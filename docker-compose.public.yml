services:
  mysql:
    ports: !reset []

  redis:
    ports: !reset []

  rabbitmq:
    ports: !reset []

  nacos:
    ports: !reset []

  minio:
    ports: !reset []

  gateway:
    ports: !reset []

  frontend:
    ports: !reset []

  caddy:
    image: caddy:2.10-alpine
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?PUBLIC_DOMAIN must be supplied by deployment configuration}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
