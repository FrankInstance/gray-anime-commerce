name: Core Flow CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-flow-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  core-flow:
    name: Core flow regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build frontend assets
        run: npm run build

      - name: Package backend services
        run: mvn --batch-mode --no-transfer-progress -DskipTests package

      - name: Start application stack
        run: docker compose up -d --build --wait --wait-timeout 300

      - name: Run core regression suite
        run: npm run test:core

      - name: Collect failure diagnostics
        if: failure()
        run: |
          mkdir -p output/ci
          docker compose ps --all > output/ci/compose-ps.txt || true
          docker compose logs --no-color > output/ci/compose.log || true

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: core-flow-diagnostics-${{ github.run_attempt }}
          path: |
            output/ci/
            output/playwright/
          if-no-files-found: warn
          retention-days: 7

      - name: Stop application stack
        if: always()
        run: docker compose down --volumes --remove-orphans
