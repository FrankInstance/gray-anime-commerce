server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:gray_anime}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_0900_ai_ci&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:gray}
    password: ${MYSQL_PASSWORD:gray_pass}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:gray}
    password: ${RABBITMQ_PASSWORD:gray_pass}
  sql:
    init:
      mode: always
      encoding: UTF-8
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_ENABLED:true}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:}

security:
  jwt:
    issuer: ${JWT_ISSUER:gray-auth}
    audience: ${JWT_AUDIENCE:gray-api}
    key-id: ${JWT_KEY_ID:gray-access-2026-01}
    public-key-location: ${JWT_PUBLIC_KEY_LOCATION:file:./deploy/keys/access-token-public.pem}
    private-key-location: ${JWT_PRIVATE_KEY_LOCATION:file:./deploy/keys/access-token-private.pem}
  session:
    access-token-ttl-seconds: ${ACCESS_TOKEN_TTL_SECONDS:900}
    idle-ttl-seconds: ${AUTH_SESSION_IDLE_TTL_SECONDS:259200}
    refresh-cookie-name: ${AUTH_REFRESH_COOKIE_NAME:gray_refresh}
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
  login-throttle:
    account-key-secret: ${AUTH_LOGIN_THROTTLE_SECRET:local-login-throttle-secret-change-me}
    failure-window-seconds: ${AUTH_LOGIN_FAILURE_WINDOW_SECONDS:86400}
    max-attempts: ${AUTH_LOGIN_MAX_ATTEMPTS:5}
    initial-block-seconds: ${AUTH_LOGIN_INITIAL_BLOCK_SECONDS:30}
    max-block-seconds: ${AUTH_LOGIN_MAX_BLOCK_SECONDS:900}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
