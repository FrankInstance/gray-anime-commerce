server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_ENABLED:true}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:}
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
                allowed-methods: GET,POST,PUT,DELETE,OPTIONS
                allowed-headers: Authorization,Content-Type,X-Trace-Id
                exposed-headers: X-Trace-Id
                allow-credentials: true
          routes:
            - id: auth-login-rate-limited
              order: -20
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/login
                - Method=POST
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@clientAddressKeyResolver}"
                    redis-rate-limiter.replenishRate: ${operations.rate-limit.auth-login.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${operations.rate-limit.auth-login.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${operations.rate-limit.auth-login.requested-tokens}
            - id: auth-account-rate-limited
              order: -20
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/register,/api/v1/auth/password-reset/**
                - Method=POST
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@clientAddressKeyResolver}"
                    redis-rate-limiter.replenishRate: ${operations.rate-limit.auth-account.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${operations.rate-limit.auth-account.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${operations.rate-limit.auth-account.requested-tokens}
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users/**,/api/v1/checkins/**,/api/v1/admin/users/**
            - id: order-chapter-purchase
              uri: lb://order-service
              predicates:
                - Path=/api/v1/chapters/*/purchase,/api/v1/vip/orders,/api/v1/orders/**,/api/v1/admin/orders/**,/api/v1/admin/dashboard/**
            - id: content-service
              uri: lb://content-service
              predicates:
                - Path=/api/v1/works/**,/api/v1/chapters/**,/api/v1/reading/**,/api/v1/admin/works/**
            - id: shop-service
              uri: lb://shop-service
              predicates:
                - Path=/api/v1/products/**,/api/v1/cart/**,/api/v1/admin/products/**
            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/v1/admin/inventory/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userOrClientAddressKeyResolver}"
                    redis-rate-limiter.replenishRate: ${operations.rate-limit.payment.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${operations.rate-limit.payment.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${operations.rate-limit.payment.requested-tokens}
            - id: ingestion-service
              uri: lb://ingestion-service
              predicates:
                - Path=/api/v1/admin/import-tasks/**

security:
  jwt:
    issuer: ${JWT_ISSUER:gray-auth}
    audience: ${JWT_AUDIENCE:gray-api}
    key-id: ${JWT_KEY_ID:gray-access-2026-01}
    public-key-location: ${JWT_PUBLIC_KEY_LOCATION:file:./deploy/keys/access-token-public.pem}

operations:
  rate-limit:
    trusted-proxy-hops: 0
    auth-login:
      replenish-rate: 100
      burst-capacity: 100
      requested-tokens: 1
    auth-account:
      replenish-rate: 100
      burst-capacity: 100
      requested-tokens: 1
    payment:
      replenish-rate: 100
      burst-capacity: 100
      requested-tokens: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
