x-backend-healthcheck: &backend-healthcheck
  test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
  interval: 10s
  timeout: 5s
  retries: 30
  start_period: 30s

x-service-environment: &service-env
  SERVER_PORT: 8080
  SPRING_PROFILES_ACTIVE: local
  MYSQL_HOST: mysql
  MYSQL_DATABASE: gray_anime
  MYSQL_USER: gray
  MYSQL_PASSWORD: gray_pass
  REDIS_HOST: redis
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_USER: gray
  RABBITMQ_PASSWORD: gray_pass
  NACOS_ADDR: nacos:8848
  JWT_ISSUER: gray-auth
  JWT_AUDIENCE: gray-api
  JWT_KEY_ID: gray-access-2026-01
  JWT_PUBLIC_KEY_LOCATION: file:/run/secrets/gray_jwt_public_key
  JAVA_OPTS: "-Xms128m -Xmx256m"

x-public-key-secrets: &public-key-secrets
  - source: gray_jwt_public_key
    target: gray_jwt_public_key

services:
  mysql:
    image: mysql:8.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: gray_anime
      MYSQL_USER: gray
      MYSQL_PASSWORD: gray_pass
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ugray", "-pgray_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: gray
      RABBITMQ_DEFAULT_PASS: gray_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  nacos:
    image: nacos/nacos-server:v2.4.3
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 128m
      JVM_XMX: 256m
      JVM_XMN: 64m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos_data:/home/nacos/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/v1/console/health/readiness | grep -q OK"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        SERVICE_NAME: gateway-service
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: local
      NACOS_ADDR: nacos:8848
      REDIS_HOST: redis
      JAVA_OPTS: "-Xms128m -Xmx256m"
      JWT_ISSUER: gray-auth
      JWT_AUDIENCE: gray-api
      JWT_KEY_ID: gray-access-2026-01
      JWT_PUBLIC_KEY_LOCATION: file:/run/secrets/gray_jwt_public_key
      CORS_ALLOWED_ORIGIN_PATTERNS: http://localhost:*,http://127.0.0.1:*
    secrets: *public-key-secrets
    ports:
      - "8080:8080"
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        SERVICE_NAME: user-service
    environment:
      <<: *service-env
      JWT_PRIVATE_KEY_LOCATION: file:/run/secrets/gray_jwt_private_key
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      AUTH_SESSION_IDLE_TTL_SECONDS: ${AUTH_SESSION_IDLE_TTL_SECONDS:-259200}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    secrets:
      - source: gray_jwt_public_key
        target: gray_jwt_public_key
      - source: gray_jwt_private_key
        target: gray_jwt_private_key
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    restart: unless-stopped

  content-service:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        SERVICE_NAME: content-service
    environment: *service-env
    secrets: *public-key-secrets
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    restart: unless-stopped

  shop-service:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        SERVICE_NAME: shop-service
    environment: *service-env
    secrets: *public-key-secrets
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    restart: unless-stopped

  inventory-service:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        SERVICE_NAME: inventory-service
    environment: *service-env
    secrets: *public-key-secrets
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        SERVICE_NAME: order-service
    environment: *service-env
    secrets: *public-key-secrets
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        SERVICE_NAME: payment-service
    environment: *service-env
    secrets: *public-key-secrets
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    restart: unless-stopped

  ingestion-service:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
      args:
        SERVICE_NAME: ingestion-service
    environment: *service-env
    secrets: *public-key-secrets
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  nacos_data:
  minio_data:

secrets:
  gray_jwt_private_key:
    file: ./deploy/keys/access-token-private.pem
  gray_jwt_public_key:
    file: ./deploy/keys/access-token-public.pem
