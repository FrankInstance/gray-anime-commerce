services:
  mysql:
    ports: !reset []

  redis:
    ports: !reset []

  rabbitmq:
    ports: !reset []

  nacos:
    ports: !reset []

  minio:
    ports: !reset []

  qdrant:
    ports: !reset []

  gateway:
    ports: !reset []

  frontend:
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?PUBLIC_DOMAIN must be supplied by deployment configuration}
      GRAY_PUBLIC_ENTRYPOINT: "true"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /opt/gray/certbot/www:/var/www/certbot:ro
