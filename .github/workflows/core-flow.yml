name: Core Flow CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-flow-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  core-flow:
    name: Core flow regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate local authentication keys
        run: npm run setup:auth-keys

      - name: Validate operations assets
        env:
          GRAFANA_ADMIN_PASSWORD: ci-observability-password
          JWT_ISSUER: https://demo.example.com
          JWT_AUDIENCE: gray-api
          JWT_KEY_ID: ci-validation-key
          JWT_PRIVATE_KEY_FILE: ./deploy/keys/access-token-private.pem
          JWT_PUBLIC_KEY_FILE: ./deploy/keys/access-token-public.pem
          MYSQL_ROOT_PASSWORD: ci-root-password
          MYSQL_PASSWORD: ci-app-password
          RABBITMQ_PASSWORD: ci-rabbit-password
          MINIO_ROOT_USER: ci-minio-user
          MINIO_ROOT_PASSWORD: ci-minio-password
          AUTH_LOGIN_THROTTLE_SECRET: ci-validation-secret-with-at-least-32-characters
          CORS_ALLOWED_ORIGIN_PATTERNS: https://demo.example.com
          PUBLIC_DOMAIN: demo.example.com
          LETSENCRYPT_EMAIL: ci@example.com
        run: |
          npm run test:operations
          node --check deploy/operations/demo-smoke.mjs
          bash -n deploy/operations/mysql-backup.sh
          bash -n deploy/operations/mysql-restore-verify.sh
          bash -n deploy/production/issue-certificate.sh
          bash -n deploy/production/install-certbot-renewal.sh
          bash -n deploy/production/certbot-deploy-hook.sh
          docker compose -f docker-compose.yml -f docker-compose.observability.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.production.yml -f docker-compose.observability.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.production.yml -f docker-compose.demo.yml -f docker-compose.observability.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.production.yml -f docker-compose.demo.yml -f docker-compose.public.yml config --quiet

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build frontend assets
        run: npm run build:local

      - name: Validate public Nginx HTTP and TLS configurations
        run: |
          docker build -f deploy/docker/frontend.Dockerfile -t gray-frontend-nginx-ci .
          docker run --rm \
            -e GRAY_PUBLIC_ENTRYPOINT=true \
            -e PUBLIC_DOMAIN=demo.example.com \
            gray-frontend-nginx-ci nginx -t
          mkdir -p /tmp/gray-letsencrypt/live/demo.example.com
          openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
            -subj '/CN=demo.example.com' \
            -keyout /tmp/gray-letsencrypt/live/demo.example.com/privkey.pem \
            -out /tmp/gray-letsencrypt/live/demo.example.com/fullchain.pem
          docker run --rm \
            -e GRAY_PUBLIC_ENTRYPOINT=true \
            -e PUBLIC_DOMAIN=demo.example.com \
            -v /tmp/gray-letsencrypt:/etc/letsencrypt:ro \
            gray-frontend-nginx-ci nginx -t

      - name: Package backend services
        run: mvn --batch-mode --no-transfer-progress -DskipTests package

      - name: Start application stack
        run: docker compose up -d --build --wait --wait-timeout 300

      - name: Run core regression suite
        run: npm run test:core

      - name: Collect failure diagnostics
        if: failure()
        run: |
          mkdir -p output/ci
          docker compose ps --all > output/ci/compose-ps.txt || true
          docker compose logs --no-color > output/ci/compose.log || true

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: core-flow-diagnostics-${{ github.run_attempt }}
          path: |
            output/ci/
            output/playwright/
          if-no-files-found: warn
          retention-days: 7

      - name: Stop application stack
        if: always()
        run: docker compose down --volumes --remove-orphans
