server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_ENABLED:true}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:}
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origin-patterns: "*"
                allowed-methods: "*"
                allowed-headers: "*"
                allow-credentials: true
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users/**,/api/v1/checkins/**,/api/v1/admin/users/**
            - id: order-chapter-purchase
              uri: lb://order-service
              predicates:
                - Path=/api/v1/chapters/*/purchase,/api/v1/vip/orders,/api/v1/orders/**,/api/v1/admin/orders/**,/api/v1/admin/dashboard/**
            - id: content-service
              uri: lb://content-service
              predicates:
                - Path=/api/v1/works/**,/api/v1/chapters/**,/api/v1/admin/works/**
            - id: shop-service
              uri: lb://shop-service
              predicates:
                - Path=/api/v1/products/**,/api/v1/cart/**,/api/v1/admin/products/**
            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/v1/internal/inventory/**,/api/v1/admin/inventory/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments/**
            - id: ingestion-service
              uri: lb://ingestion-service
              predicates:
                - Path=/api/v1/admin/import-tasks/**

security:
  jwt:
    secret: ${JWT_SECRET:dev-secret-dev-secret-dev-secret-123456}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
